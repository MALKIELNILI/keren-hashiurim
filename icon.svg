<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#3b0764"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#b8973a"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="url(#bg)"/>
  <circle cx="50" cy="50" r="47" fill="none" stroke="url(#gold)" stroke-width="1.5"/>

  <!-- Torah scroll body -->
  <rect x="28" y="30" width="44" height="36" rx="3" fill="url(#gold)" opacity="0.95"/>
  <!-- Scroll lines -->
  <line x1="34" y1="38" x2="66" y2="38" stroke="#5b21b6" stroke-width="1.5" opacity="0.7"/>
  <line x1="34" y1="44" x2="66" y2="44" stroke="#5b21b6" stroke-width="1.5" opacity="0.7"/>
  <line x1="34" y1="50" x2="66" y2="50" stroke="#5b21b6" stroke-width="1.5" opacity="0.7"/>
  <line x1="34" y1="56" x2="55" y2="56" stroke="#5b21b6" stroke-width="1.5" opacity="0.7"/>
  <!-- Scroll handles -->
  <rect x="22" y="27" width="8" height="42" rx="4" fill="url(#gold)"/>
  <rect x="70" y="27" width="8" height="42" rx="4" fill="url(#gold)"/>
  <!-- Handle caps -->
  <circle cx="26" cy="27" r="5" fill="#fde68a"/>
  <circle cx="26" cy="69" r="5" fill="#fde68a"/>
  <circle cx="74" cy="27" r="5" fill="#fde68a"/>
  <circle cx="74" cy="69" r="5" fill="#fde68a"/>

  <!-- Bottom text -->
  <text x="50" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#fde68a">קרן השיעורים</text>
</svg>
